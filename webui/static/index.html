<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verve · Trading Agents</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/floor.css">
  <script src="https://cdn.jsdelivr.net/npm/marked@13.0.0/marked.min.js"></script>
</head>
<body>

  <!-- BRAND HEADER -->
  <header class="v-brand-bar">
    <div class="v-brand">
      <div class="v-brand-mark"></div>
      <div class="v-brand-name">VERVE</div>
      <div class="v-brand-sub">Trading agents</div>
    </div>
    <nav class="v-nav">
      <button class="v-nav-item" data-view="home">New run</button>
      <button class="v-nav-item" data-view="desk">Floor</button>
      <button class="v-nav-item" data-view="stage">Stage</button>
    </nav>
  </header>

  <!-- MARQUEE -->
  <div class="v-marquee" id="v-marquee">
    <div class="v-marquee-anchor">
      <span class="v-pulse-dot"></span>
      <span class="v-marquee-pulse-label">Live</span>
    </div>
    <div class="v-marquee-track" id="v-marquee-track">
      <!-- ticks injected by floor.js -->
    </div>
  </div>

  <!-- VIEWS -->
  <main class="v-page">
    <section class="v-view v-hidden" id="v-view-home">
      <div id="v-home"></div>
    </section>
    <section class="v-view v-hidden" id="v-view-desk">
      <div id="v-desk"></div>
    </section>
    <section class="v-view v-hidden" id="v-view-stage">
      <div id="v-stage"></div>
    </section>
  </main>

  <script src="/static/js/floor.js"></script>
</body>
</html>
