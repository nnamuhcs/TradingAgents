apiVersion: batch/v1
kind: Job
metadata:
  name: tradingagents-manual
  namespace: tradingagents
  labels:
    app.kubernetes.io/name: tradingagents
    app.kubernetes.io/component: manual-run
spec:
  backoffLimit: 1
  activeDeadlineSeconds: 1800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tradingagents
        app.kubernetes.io/component: worker
    spec:
      restartPolicy: Never
      containers:
        - name: tradingagents
          image: tradingagents:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "main_copilot.py"]
          envFrom:
            - configMapRef:
                name: tradingagents-config
            - secretRef:
                name: tradingagents-secrets
          volumeMounts:
            - name: data
              mountPath: /home/appuser/.tradingagents
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tradingagents-data
