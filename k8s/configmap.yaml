apiVersion: v1
kind: ConfigMap
metadata:
  name: tradingagents-config
  namespace: tradingagents
  labels:
    app.kubernetes.io/name: tradingagents
data:
  # LLM Provider: openai, anthropic, google, github-copilot, xai, deepseek, ollama
  LLM_PROVIDER: "github-copilot"
  # Model for complex reasoning (debates, decisions)
  DEEP_THINK_LLM: "claude-opus-4.7"
  # Model for fast tasks (data fetching, parsing)
  QUICK_THINK_LLM: "claude-opus-4.7"
  # Data vendors: yfinance (free) or alpha_vantage (requires key)
  DATA_VENDOR: "yfinance"
  # Trading config
  MAX_DEBATE_ROUNDS: "1"
  MAX_RISK_DISCUSS_ROUNDS: "1"
  # Output language
  OUTPUT_LANGUAGE: "English"
  # Scanner mode: "full" (scan + pipeline) or "scan-only" (scan only)
  SCANNER_MODE: "full"
  # Max stocks for scanner to analyze through pipeline
  SCANNER_MAX_PICKS: "10"
